index.html<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Pure Python MNIST Recognizer</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <style>
       #canvas { touch-action: none; background: black; cursor: crosshair; }
       .prob-bar { transition: width 0.5s ease-out; }
   </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">


   <div class="bg-white rounded-3xl shadow-xl p-8 max-w-4xl w-full flex flex-col md:flex-row gap-10">
       <!-- Drawing Section -->
       <div class="flex-1 flex flex-col items-center">
           <h1 class="text-2xl font-bold text-slate-800 mb-6">손글씨 인식 (Flask)</h1>
           <canvas id="canvas" width="280" height="280" class="rounded-2xl border-4 border-slate-200 shadow-inner"></canvas>
          
           <div class="flex gap-4 mt-6 w-full">
               <button id="clearBtn" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition">지우기</button>
               <button id="predictBtn" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-lg shadow-blue-200">예측하기</button>
           </div>
       </div>


       <!-- Result Section -->
       <div class="flex-1 flex flex-col justify-center">
           <div class="text-center mb-8">
               <span class="text-sm font-semibold text-slate-400 uppercase tracking-widest">Prediction Result</span>
               <div id="mainResult" class="text-9xl font-black text-blue-600 mt-2">?</div>
           </div>


           <div id="probList" class="space-y-2">
               <!-- JS에서 채워짐 -->
           </div>
       </div>
   </div>


   <script>
       const canvas = document.getElementById('canvas');
       const ctx = canvas.getContext('2d');
       const mainResult = document.getElementById('mainResult');
       const probList = document.getElementById('probList');


       let isDrawing = false;


       // 초기 확률 바 생성
       for(let i=0; i<10; i++) {
           probList.innerHTML += `
               <div class="flex items-center gap-3">
                   <span class="w-4 text-xs font-bold text-slate-500">${i}</span>
                   <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                       <div id="bar-${i}" class="prob-bar h-full bg-blue-400" style="width: 0%"></div>
                   </div>
               </div>
           `;
       }


       // 캔버스 그리기 로직
       function getPos(e) {
           const rect = canvas.getBoundingClientRect();
           const clientX = e.touches ? e.touches[0].clientX : e.clientX;
           const clientY = e.touches ? e.touches[0].clientY : e.clientY;
           return { x: clientX - rect.left, y: clientY - rect.top };
       }


       const start = (e) => { isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
       const draw = (e) => {
           if(!isDrawing) return;
           const pos = getPos(e);
           ctx.lineTo(pos.x, pos.y);
           ctx.lineWidth = 18;
           ctx.lineCap = 'round';
           ctx.strokeStyle = 'white';
           ctx.stroke();
       };
       const stop = () => isDrawing = false;


       canvas.addEventListener('mousedown', start);
       canvas.addEventListener('mousemove', draw);
       window.addEventListener('mouseup', stop);
       canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
       canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
       canvas.addEventListener('touchend', stop);


       document.getElementById('clearBtn').onclick = () => {
           ctx.clearRect(0, 0, canvas.width, canvas.height);
           mainResult.innerText = '?';
           for(let i=0; i<10; i++) document.getElementById(`bar-${i}`).style.width = '0%';
       };


       // 서버 통신 (예측)
       document.getElementById('predictBtn').onclick = async () => {
           const imageData = canvas.toDataURL('image/png');
          
           const response = await fetch('/predict', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ image: imageData })
           });


           const data = await response.json();
           if(data.result !== undefined) {
               mainResult.innerText = data.result;
               data.probabilities.forEach((p, i) => {
                   document.getElementById(`bar-${i}`).style.width = (p * 100) + '%';
               });
           }
       };
   </script>
</body>
</html>
