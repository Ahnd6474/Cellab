  <text class="label" x="712" y="244">8</text>
  <text class="label" x="743" y="244">9</text>
  <text class="label" x="770" y="244">10</text>
  <text class="label" x="801" y="244">11</text>
  <text class="label" x="832" y="244">12</text>

  <text class="label" x="227" y="272">Epoch</text>
  <text class="label" x="657" y="272">Epoch</text>

  <polyline class="train" points="70.0,66.6 100.9,204.8 131.8,213.0 162.7,215.5 193.6,216.0 224.5,217.8 255.5,219.3 286.4,219.4 317.3,217.8 348.2,216.0 379.1,219.3 410.0,219.7" />
  <polyline class="val" points="70.0,195.9 100.9,205.4 131.8,205.9 162.7,196.9 193.6,204.8 224.5,204.6 255.5,207.5 286.4,205.2 317.3,194.0 348.2,204.6 379.1,211.2 410.0,200.0" />

  <polyline class="train" points="500.0,219.3 530.9,85.7 561.8,72.7 592.7,68.7 623.6,68.1 654.5,64.6 685.5,61.3 716.4,61.3 747.3,64.2 778.2,68.6 809.1,62.0 840.0,60.7" />
  <polyline class="val" points="500.0,102.7 530.9,80.6 561.8,84.4 592.7,95.8 623.6,83.6 654.5,81.3 685.5,79.8 716.4,79.0 747.3,98.8 778.2,81.3 809.1,74.5 840.0,91.2" />

  <line class="train" x1="700" y1="24" x2="730" y2="24" />
  <text class="legend" x="738" y="28">Train</text>
  <line class="val" x1="790" y1="24" x2="820" y2="24" />
  <text class="legend" x="828" y="28">Validation</text>
</svg>
